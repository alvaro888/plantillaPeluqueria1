<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="40" height="40">
  <!-- Tijeras estilizadas -->
  <defs>
    <linearGradient id="scissorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b57d2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#af4f2a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hoja izquierda -->
  <path d="M 30 20 Q 20 30 25 50 Q 20 70 30 80 L 50 50 Z" fill="url(#scissorGradient)" stroke="#af4f2a" stroke-width="1.5"/>
  
  <!-- Hoja derecha -->
  <path d="M 70 20 Q 80 30 75 50 Q 80 70 70 80 L 50 50 Z" fill="url(#scissorGradient)" stroke="#af4f2a" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Decoración central -->
  <circle cx="50" cy="50" r="8" fill="none" stroke="#255f58" stroke-width="2"/>
  <circle cx="50" cy="50" r="4" fill="#255f58" opacity="0.6"/>
</svg>
